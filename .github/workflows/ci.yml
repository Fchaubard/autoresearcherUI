name: ci

# Unit tests + the end-to-end integration test gate every merge to main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with dev deps)
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest tests/unit/ -q

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run the e2e integration test
        run: bash tests/run_e2e.sh
